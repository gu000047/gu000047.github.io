<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Reggie's Coffee Shop - Contact</title>
</head>

<body>
    <!-- Control + / or Command + / -->
    <!--this is a HTML comment -->
    <!-- Site header -->
    <header>
        <h1>Reggie's Coffe Shop</h1>
        <nav>
            <ul>
                <li>
                    <a href="index.html">Home</a>
                </li>
                <li>
                    <a href="contact.html">Contact</a>
                </li>
            </ul>
        </nav>
    </header>
    <!-- page content -->
    <main>
        <h2>contact us</h2>
        <table>
            <caption>Hours of Opertion </caption>
            <thead>
                <tr>
                    <th>Days</th>
                    <th>Hours</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Mon - Fri</td>
                    <td>6 AM - 9 PM</td>
                </tr>
                <tr>
                    <td>Sat</td>
                    <td>8 AM - 11 PM</td>
                </tr>
                <tr>
                    <td>Sun</td>
                    <td>Closed</td>
                </tr>
            </tbody>
        </table>
        <!-- Adding a form -->
        <section>
         <h3>We love to hear from you!</h3>
         <form action="thanks.html" method="get">
           <div>
            <label for="fullname">Your Name</label>
          <input type="text" id="fullname" name="yourname" placeholder="Cynthia" value="Ms."> 
          </div>
          <div>
          <label for="youremail">Email</label>
          <input type="email" name="youremail" id="youremail" required>
         </div>
         <button type="submit">Sign me up</button>
      </form>
    </section>
    </main>
    <footer>
      <!-- HTML Entity -->
      Copyright Reggie's Coffee Shop, 2020
    </footer>
</body>

</html>
